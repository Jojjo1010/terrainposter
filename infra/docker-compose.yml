version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: terrainposter
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: terrain
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379
      RAYSHADER_URL: http://rayshader:8787
      DATA_DIR: /data/processed
    volumes:
      - ../data:/data:ro
      - renders:/app/renders
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rayshader:
        condition: service_healthy

  worker:
    build: ../backend
    command: python -m rq worker --url redis://redis:6379 render
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379
      RAYSHADER_URL: http://rayshader:8787
      DATA_DIR: /data/processed
    volumes:
      - ../data:/data:ro
      - renders:/app/renders
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rayshader:
        condition: service_healthy

  rayshader:
    build: ../rayshader-service
    ports:
      - "8787:8787"
    volumes:
      - renders:/app/output
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  renders:
